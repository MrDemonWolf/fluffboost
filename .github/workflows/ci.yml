name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test:coverage
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/fluffboost
          REDIS_URL: redis://localhost:6379
          DISCORD_APPLICATION_ID: ci-test-app-id
          DISCORD_APPLICATION_PUBLIC_KEY: ci-test-public-key
          DISCORD_APPLICATION_BOT_TOKEN: ci-test-bot-token
          OWNER_ID: ci-test-owner-id
          MAIN_GUILD_ID: ci-test-guild-id
          MAIN_CHANNEL_ID: ci-test-channel-id
          POSTHOG_API_KEY: ci-test-posthog-key
          POSTHOG_HOST: https://ci-test-posthog.example.com

      - name: Run ESLint
        run: bun run lint:check

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: bun pm audit
        continue-on-error: true

      - name: Check for outdated packages
        run: bun pm outdated
        continue-on-error: true

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fluffboost:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
